<svg xmlns="http://www.w3.org/2000/svg" width="200" height="50" viewBox="0 0 200 50" style="background:none;">
  <defs>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer border -->
  <rect x="2" y="2" width="196" height="46" rx="8" fill="#02040a" stroke="url(#docGrad)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Content -->
  <g transform="translate(15, 12)">
    <!-- Document Icon -->
    <path d="M4,2 L18,2 L24,8 L24,24 Q24,26 22,26 L4,26 Q2,26 2,24 L2,4 Q2,2 4,2 Z" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <path d="M16,2 L16,10 L24,10" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="6" y1="14" x2="14" y2="14" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="6" y1="19" x2="18" y2="19" stroke="#00d4ff" stroke-width="1.5"/>
    
    <!-- Text -->
    <text x="36" y="17" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="900" fill="#ffffff" letter-spacing="2">SYSTEM DOCS</text>
  </g>
</svg>
