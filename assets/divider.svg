<svg xmlns="http://www.w3.org/2000/svg" width="800" height="20" viewBox="0 0 800 20" style="background:none;">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#02040a" stop-opacity="0" />
      <stop offset="15%" stop-color="#00d4ff" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#ff007f" stop-opacity="1" />
      <stop offset="85%" stop-color="#00d4ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#02040a" stop-opacity="0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Horizontal Center Line -->
  <line x1="0" y1="10" x2="800" y2="10" stroke="url(#divGrad)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Cyberpunk Diamonds in the center -->
  <polygon points="400,4 406,10 400,16 394,10" fill="#ffffff" filter="url(#glow)" />
  <polygon points="370,7 373,10 370,13 367,10" fill="#00d4ff" />
  <polygon points="430,7 433,10 430,13 427,10" fill="#ff007f" />
</svg>
