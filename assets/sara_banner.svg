<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%" style="background:#02040a; font-family:'Segoe UI', system-ui, sans-serif;">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02040a" />
      <stop offset="50%" stop-color="#090f1d" />
      <stop offset="100%" stop-color="#010205" />
    </linearGradient>

    <!-- Hologram Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="slightGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Text Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#ff6a00" />
    </linearGradient>
    
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a254c" stroke-width="0.5" opacity="0.3" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bgGrad)" />
  <rect width="800" height="300" fill="url(#grid)" />

  <!-- Cyberpunk Tech Circles (Decorative) -->
  <circle cx="700" cy="150" r="120" fill="none" stroke="#1a254c" stroke-width="1" opacity="0.4" />
  <circle cx="700" cy="150" r="90" fill="none" stroke="url(#cyanGrad)" stroke-width="1.5" stroke-dasharray="10, 15" opacity="0.6" filter="url(#slightGlow)" />
  <circle cx="700" cy="150" r="60" fill="none" stroke="#ff007f" stroke-width="1" stroke-dasharray="40, 8" opacity="0.5" />
  
  <!-- Waveform (representing Voice AI) -->
  <g transform="translate(540, 150)" filter="url(#slightGlow)">
    <path d="M-60,0 Q-45,-40 -30,0 T0,0 T30,0 T60,0" fill="none" stroke="#00f0ff" stroke-width="3" opacity="0.8" />
    <path d="M-80,0 Q-60,20 -40,0 T0,0 T40,0 T80,0" fill="none" stroke="#ff007f" stroke-width="2" opacity="0.6" />
    <path d="M-100,0 Q-50,-70 0,0 T100,0" fill="none" stroke="#ff6a00" stroke-width="1.5" opacity="0.5" />
    <circle cx="0" cy="0" r="6" fill="#ffffff" filter="url(#glow)" />
  </g>

  <!-- Hexagonal Tech Details -->
  <polygon points="50,40 70,40 80,50 60,50" fill="#00d4ff" opacity="0.6" />
  <line x1="50" y1="45" x2="250" y2="45" stroke="#1a254c" stroke-width="1" opacity="0.5" />
  
  <!-- Brand Header -->
  <g transform="translate(60, 125)">
    <!-- Futuristic Logo Icon -->
    <g transform="translate(0, -35)">
      <polygon points="0,15 15,0 35,0 45,15 30,35 10,35" fill="none" stroke="url(#primaryGrad)" stroke-width="3" filter="url(#glow)" />
      <polygon points="8,17 17,8 27,8 32,17 25,27 15,27" fill="url(#cyanGrad)" opacity="0.8" />
      <circle cx="20" cy="17" r="3" fill="#ffffff" />
    </g>
    
    <!-- Title -->
    <text x="65" y="0" font-size="54" font-weight="900" letter-spacing="6" fill="url(#primaryGrad)" filter="url(#glow)">S.A.R.A.</text>
    
    <!-- Subtitle -->
    <text x="65" y="30" font-size="15" font-weight="700" letter-spacing="2" fill="#00d4ff" opacity="0.9">SMART AWAIS'S RESPONSE ASSISTANT</text>
    
    <!-- Tagline -->
    <text x="65" y="65" font-size="13" font-weight="500" letter-spacing="1" fill="#8ec5fc" opacity="0.8">The Ultimate Autonomous AI Assistant &amp; OS Controller</text>
  </g>

  <!-- Bottom Cyber Details -->
  <rect x="60" y="240" width="120" height="4" fill="url(#accentGrad)" />
  <text x="190" y="244" font-size="9" font-weight="bold" letter-spacing="3" fill="#4e638c">SYSTEM ONLINE // VER 2.0</text>
  <line x1="390" y1="242" x2="740" y2="242" stroke="#1a254c" stroke-dasharray="5, 5" />
</svg>
